spring.application.name=pmt

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pmt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pmt}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pmt}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}

management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=false
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
