services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pmt
      POSTGRES_USER: pmt
      POSTGRES_PASSWORD: pmt
    ports:
      - "5432:5432"
    volumes:
      - pmt-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/test-data.sql:/docker-entrypoint-initdb.d/02-test-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmt -d pmt"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/pmt
      SPRING_DATASOURCE_USERNAME: pmt
      SPRING_DATASOURCE_PASSWORD: pmt
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:8081
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pmt-data:
